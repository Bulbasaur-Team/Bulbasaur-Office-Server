databaseChangeLog:
  - changeSet:
      id: 1-create-players
      author: bulba
      changes:
        - createTable:
            tableName: players
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: varchar(30)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_players_login
              - column:
                  name: password_hash
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
